<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Baybayin Translator</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Tagalog&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;

    background:linear-gradient(
        -45deg,
        #0f172a,
        #1e293b,
        #334155,
        #1e1b4b
    );

    background-size:400% 400%;

    animation:gradient 15s ease infinite;

    color:white;

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:flex-start;

    padding:20px;

    overflow-x:hidden;
}

@keyframes gradient{
    0%{
        background-position:0% 50%;
    }
    50%{
        background-position:100% 50%;
    }
    100%{
        background-position:0% 50%;
    }
}

.container{

    width:100%;

    max-width:850px;

    background:rgba(30,41,59,.85);

    backdrop-filter:blur(12px);

    border-radius:20px;

    padding:30px;

    box-shadow:0 8px 32px rgba(0,0,0,.35);

    animation:fadeUp .8s ease;
}

@keyframes fadeUp{

    from{
        opacity:0;
        transform:translateY(20px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

h1{
    font-size:3rem;

    margin-bottom:25px;

    font-weight:700;
}

textarea{

    width:100%;

    min-height:220px;

    border:none;

    outline:none;

    border-radius:16px;

    padding:20px;

    resize:vertical;

    font-size:1.1rem;

    line-height:1.6;

    transition:.2s ease;

    background:white;

    color:#111827;
}

textarea:focus{

    transform:translateY(-2px);

    box-shadow:0 4px 20px rgba(255,255,255,.15);
}

.options{

    margin:20px 0;

    display:flex;

    align-items:center;

    gap:10px;

    font-size:1.1rem;
}

.output{

    width:100%;

    min-height:140px;

    background:#334155;

    border-radius:16px;

    padding:20px;

    font-family:'Noto Sans Tagalog', sans-serif;

    font-size:2.2rem;

    line-height:1.8;

    word-break:break-word;

    transition:.2s ease;
}

.output:hover{

    transform:translateY(-2px);

    box-shadow:0 4px 20px rgba(255,255,255,.15);
}

button{

    margin-top:20px;

    padding:14px 24px;

    border:none;

    border-radius:12px;

    cursor:pointer;

    font-size:1rem;

    font-weight:600;

    transition:.2s ease;

    background:white;

    color:#111827;
}

button:hover{

    transform:scale(1.05);
}

/* SNACKBAR */

#snackbar{

    position:fixed;

    left:50%;

    bottom:30px;

    transform:translateX(-50%) translateY(100px);

    background:rgba(15,23,42,.95);

    color:white;

    padding:14px 22px;

    border-radius:12px;

    font-size:1rem;

    box-shadow:0 8px 24px rgba(0,0,0,.3);

    opacity:0;

    transition:
        transform .35s ease,
        opacity .35s ease;

    z-index:9999;
}

#snackbar.show{

    opacity:1;

    transform:translateX(-50%) translateY(0);
}

/* MOBILE RESPONSIVE */

@media (max-width:768px){

    body{
        padding:14px;
    }

    .container{
        padding:20px;
        border-radius:16px;
    }

    h1{
        font-size:2rem;
        line-height:1.2;
    }

    textarea{
        min-height:180px;
        font-size:1rem;
        padding:16px;
    }

    .output{
        font-size:1.8rem;
        min-height:120px;
        padding:16px;
    }

    .options{
        font-size:1rem;
    }

    button{
        width:100%;
        padding:16px;
    }
}

@media (max-width:480px){

    h1{
        font-size:1.7rem;
    }

    .output{
        font-size:1.5rem;
    }

    textarea{
        min-height:160px;
    }
}

</style>
</head>

<body>

<div class="container">

    <h1>Baybayin Translator</h1>

    <textarea
        id="input"
        placeholder="Type Filipino text..."
    ></textarea>

    <div class="options">

        <input
            type="checkbox"
            id="modernPunc"
            checked
        >

        <label for="modernPunc">
            Use Modern Baybayin Punctuation
        </label>

    </div>

    <div
        class="output"
        id="output"
    ></div>

    <button onclick="copyOut()">
        Copy
    </button>

</div>

<!-- SNACKBAR -->

<div id="snackbar">
    Copied to clipboard!
</div>

<script>

const vowels = {

    a:"ᜀ",
    e:"ᜁ",
    i:"ᜁ",
    o:"ᜂ",
    u:"ᜂ"
};

const puncMap = {

    ',':'᜵',
    '.':'᜶',
    '?':'⹁',
    ':':'⦂',
    '"':'⌜',
    "'":'ʼ',
    '-':'⹀'
};

const cons = {

    k:"ᜃ",
    g:"ᜄ",
    ng:"ᜅ",
    t:"ᜆ",
    d:"ᜇ",
    r:"ᜍ",
    n:"ᜈ",
    p:"ᜉ",
    b:"ᜊ",
    m:"ᜋ",
    y:"ᜌ",
    l:"ᜎ",
    w:"ᜏ",
    s:"ᜐ",
    h:"ᜑ"
};

const KI = "ᜒ";
const KU = "ᜓ";
const VIR = "᜔";

function normalize(text){

    return text.toLowerCase()

        .replace(/c/g,"k")
        .replace(/f/g,"p")
        .replace(/j/g,"dy")
        .replace(/ñ/g,"ny")
        .replace(/q/g,"k")
        .replace(/v/g,"b")
        .replace(/x/g,"ks")
        .replace(/z/g,"s");
}

function isV(c){

    return "aeiou".includes(c);
}

function translate(text){

    text = normalize(text);

    let out = "";

    for(let i = 0; i < text.length;){

        let ch = text[i];

        // NON LETTERS

        if(!/[a-z]/.test(ch)){

            if(
                document.getElementById('modernPunc').checked
                && puncMap[ch]
            ){

                out += puncMap[ch];
            }
            else{

                out += ch;
            }

            i++;

            continue;
        }

        // VOWELS

        if(isV(ch)){

            out += vowels[ch];

            i++;

            continue;
        }

        // CONSONANTS

        let key =
            text.slice(i,i+2) === "ng"
            ? "ng"
            : ch;

        if(!cons[key]){

            i++;

            continue;
        }

        let step =
            key === "ng"
            ? 2
            : 1;

        let next = text[i + step];

        if(next === "a"){

            out += cons[key];

            i += step + 1;
        }

        else if(
            next === "e"
            || next === "i"
        ){

            out += cons[key] + KI;

            i += step + 1;
        }

        else if(
            next === "o"
            || next === "u"
        ){

            out += cons[key] + KU;

            i += step + 1;
        }

        else{

            out += cons[key] + VIR;

            i += step;
        }
    }

    return out;
}

const input =
    document.getElementById("input");

const output =
    document.getElementById("output");

const modernPunc =
    document.getElementById("modernPunc");

function updateOutput(){

    output.textContent =
        translate(input.value);
}

input.addEventListener(
    "input",
    updateOutput
);

modernPunc.addEventListener(
    "change",
    updateOutput
);

function copyOut(){

    navigator.clipboard.writeText(
        output.textContent
    );

    const snackbar =
        document.getElementById("snackbar");

    snackbar.classList.add("show");

    setTimeout(() => {

        snackbar.classList.remove("show");

    }, 2500);
}

updateOutput();

</script>

</body>
</html>
